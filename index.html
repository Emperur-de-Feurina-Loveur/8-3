<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chúc mừng 8/3 theo số thứ tự</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #ffdbe8 0%, #fff6fa 50%, #ffe8f1 100%);
      color: #7a214a;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      text-align: center;
      background: rgba(255,255,255,0.82);
      border: 2px solid #ffc4d8;
      border-radius: 26px;
      padding: 28px 20px;
      box-shadow: 0 12px 30px rgba(199, 68, 117, 0.12);
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 40px;
      color: #d63384;
    }

    .hero p {
      margin: 0;
      font-size: 18px;
      color: #8f3b64;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      align-items: start;
    }

    .panel, .preview-panel {
      background: rgba(255,255,255,0.87);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 10px 28px rgba(199, 68, 117, 0.12);
      border: 2px solid #ffd5e3;
    }

    .panel h2, .preview-panel h2 {
      margin-top: 0;
      color: #c2185b;
      font-size: 24px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #f3a9c2;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 88px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .save-btn {
      background: #e91e63;
      color: white;
      flex: 1;
    }

    .sample-btn {
      background: #ffd6e5;
      color: #a31f54;
      flex: 1;
    }

    .search-btn {
      background: #c2185b;
      color: white;
      width: 100%;
      margin-top: 14px;
    }

    .clear-btn {
      background: #fff0f5;
      color: #a31f54;
      border: 1px solid #f3a9c2;
      width: 100%;
      margin-top: 10px;
    }

    .hint {
      margin-top: 14px;
      font-size: 14px;
      color: #9b4b6f;
      line-height: 1.5;
    }

    .search-box {
      margin-top: 26px;
      padding-top: 18px;
      border-top: 2px dashed #f2bfd2;
    }

    .wish-page {
      min-height: 640px;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: stretch;
      background: linear-gradient(160deg, #fff0f6 0%, #ffffff 45%, #fff6fb 100%);
      border: 2px solid #ffd2e2;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5), 0 14px 32px rgba(199, 68, 117, 0.14);
    }

    .wish-page::before,
    .wish-page::after {
      content: "✿";
      position: absolute;
      font-size: 72px;
      color: rgba(233, 30, 99, 0.10);
      z-index: 0;
    }

    .wish-page::before {
      top: 18px;
      left: 20px;
    }

    .wish-page::after {
      bottom: 18px;
      right: 24px;
    }

    .wish-left, .wish-right {
      position: relative;
      z-index: 1;
      width: 50%;
      padding: 30px;
    }

    .wish-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, rgba(255, 223, 235, 0.55), rgba(255,255,255,0.3));
      border-right: 2px dashed #f2bfd2;
    }

    .wish-number {
      align-self: flex-start;
      background: #d63384;
      color: white;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 20px;
      box-shadow: 0 6px 16px rgba(214, 51, 132, 0.22);
    }

    .wish-image {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 24px;
      border: 4px solid white;
      box-shadow: 0 10px 26px rgba(199, 68, 117, 0.18);
      background: #ffe7f0;
    }

    .wish-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .mini-title {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #d63384;
    }

    .wish-name {
      margin: 0 0 18px;
      font-size: 42px;
      line-height: 1.2;
      color: #b3125b;
    }

    .wish-text {
      margin: 0;
      font-size: 21px;
      line-height: 1.8;
      color: #7a214a;
      white-space: pre-wrap;
    }

    .empty-state {
      min-height: 640px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(160deg, #fff9fc, #fff3f8);
      border: 2px dashed #f0b3c8;
      color: #b45178;
      padding: 30px;
      font-size: 20px;
      line-height: 1.7;
    }

    .list-note {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #fff6fa;
      border: 1px solid #f6c5d8;
      color: #944568;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .wish-page {
        flex-direction: column;
      }

      .wish-left, .wish-right {
        width: 100%;
      }

      .wish-left {
        border-right: none;
        border-bottom: 2px dashed #f2bfd2;
      }

      .wish-name {
        font-size: 32px;
      }

      .wish-text {
        font-size: 18px;
      }
    }
  </style>
</head>

      40: { stt: 40, name: "Đinh Thị Thủy Tiên", image: "https://drive.google.com/thumbnail?id=1oJ02CSQ7cWk6jGkw-zVwOMeYSw9m4uup&sz=w1000", wish: "Nhân ngày Quốc tế Phụ nữ 8/3, chúc bạn luôn xinh đẹp, tự tin và tràn đầy năng lượng tích cực. Mong rằng bạn sẽ luôn hạnh phúc, gặp nhiều may mắn và thành công trong mọi việc!" },
      41: { stt: 41, name: "Trần Ngọc Minh Trang", image: "https://drive.google.com/thumbnail?id=1cQAqdfF_wNOrRXdqk7lia4qHFEZ-DjdN&sz=w1000", wish: "Chúc bạn một mồng tám tháng ba vui vẻ hát ca la la âu yeah baby. Càng ngày càng xinh đẹp, học giỏi nhe bờ rô ahihihihi" },
      42: { stt: 42, name: "Nguyễn Vũ Bảo Trâm", image: "https://drive.google.com/thumbnail?id=1q_UyoAEvt3ppqk0kq_GrQKJ82rec0tTr&sz=w1000", wish: "Chúc b Trâm 8/3 vui vẻ, ngày càng vẽ đẹp và thay thế mấy con AI rerach nha" },
      45: { stt: 45, name: "Hồ Thị Cẩm Vân", image: "https://drive.google.com/thumbnail?id=1p5WCceBqmcMFkVW-Oe_8OatBPhHamR_f&sz=w1000", wish: "Chúc bạn 8/3 rạng rỡ như hoa và kiêu sa như ngọc. Mừng ngày của phái đẹp, chúc bạn luôn tự tin. Chúc bạn nhận được nhiều quà, nhiều hoa và thật nhiều tình yêu, hạnh phúc ho ho ho ho ho ho ho " },
      2004: { stt: 2004, name: "Ngô Thị Minh Hạnh", image: "https://drive.google.com/thumbnail?id=1q_UyoAEvt3ppqk0kq_GrQKJ82rec0tTr&sz=w1000", wish: "Chúc cô ngày 8/3 thật nhiều niềm vui, luôn xinh đẹp, hạnh phúc và gặt hái nhiều thành công trên con đường giảng dạy ạ" }
    };

    const displayArea = document.getElementById('displayArea');
    const searchInput = document.getElementById('searchStt');

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderEmptyPreview() {
      displayArea.innerHTML = `
        <div class="empty-state">
          Nhập <b>số thứ tự</b> rồi bấm <b>Mở trang riêng</b><br>
          để xem lời chúc của bạn trong lớp.
        </div>
      `;
    }

    function showWishPage() {
      const searchValue = searchInput.value.trim();

      if (!searchValue) {
        alert('Hãy nhập số thứ tự cần xem.');
        return;
      }

      const stt = Number(searchValue);
      if (!Number.isInteger(stt)) {
        alert('Số thứ tự không hợp lệ.');
        return;
      }

      const student = studentData[stt];

      if (!student) {
        displayArea.innerHTML = `
          <div class="empty-state">
            Không tìm thấy bạn có số thứ tự <b>${escapeHtml(stt)}</b> trong danh sách.<br>
            Hãy kiểm tra lại STT rồi thử lại.
          </div>
        `;
        return;
      }

      displayArea.innerHTML = `
        <div class="wish-page">
          <div class="wish-left">
            <div class="wish-number">STT ${escapeHtml(student.stt)}</div>
            <img
              class="wish-image"
              src="${escapeHtml(student.image || defaultImage)}"
              alt="Ảnh ${escapeHtml(student.name)}"
              onerror="this.onerror=null;this.src='${defaultImage}'"
            >
          </div>
          <div class="wish-right">
            <p class="mini-title">Gửi đến bạn</p>
            <h3 class="wish-name">${escapeHtml(student.name)}</h3>
            <p class="wish-text">${escapeHtml(student.wish)}</p>
          </div>
        </div>
      `;
    }

    searchInput.addEventListener('keydown', function (event) {
      if (event.key === 'Enter') {
        showWishPage();
      }
    });

    window.showWishPage = showWishPage;
    renderEmptyPreview();
  </script>
</body>
</html>
